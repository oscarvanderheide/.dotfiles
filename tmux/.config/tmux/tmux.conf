# ============================================================================
# BASIC SETTINGS
# ============================================================================

# Start windows and panes at 1, not 0 (easier to reach on keyboard)
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Increase scrollback buffer
set-option -g history-limit 50000

# Auto-rename windows based on current directory
set-option -g status-interval 1
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{b:pane_current_path}'

# Mouse support (toggle with prefix + m)
set-option -g mouse on
bind-key m set-option -g mouse

# ============================================================================
# TECHNICAL STUFF (colors, key handling, etc.)
# ============================================================================

# Fix colors to show true color in terminal
set -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ",xterm*:Tc"
set -ag terminal-overrides ",xterm-kitty:Tc"

# Enable undercurl support (fixes dots appearing in terminal)
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colours

# Faster escape time - prevents delay when pressing Esc in vim/nvim
set -sg escape-time 10

# Enable extended key support (allows apps to distinguish Cmd from Ctrl, etc.)
set-option -g xterm-keys on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# don't exit from tmux when closing a session
set -g detach-on-destroy off 

# ============================================================================
# APPEARANCE & THEME
# ============================================================================

# Dotbar colors
set -g @tmux-dotbar-bg "#2E3440"
set -g @tmux-dotbar-fg "#4C566A"
set -g @tmux-dotbar-fg-current "#EBCB8B"
set -g @tmux-dotbar-fg-session "#D8DEE9"
set -g @tmux-dotbar-fg-prefix "#88C0D0"

# Plugins for theming
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'vaaleyard/tmux-dotbar'

# Pane border styling (set after TPM to override theme defaults)
set -g pane-border-style "fg=colour243,bg=default"
set -g pane-active-border-style "fg=colour243,bg=default"
# ============================================================================
# KEYBINDS - UTILITY
# ============================================================================

# Reload config easily
bind-key r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded..."

# Kill without confirmation
bind-key & kill-window
bind-key x kill-pane

# ============================================================================
# KEYBINDS - PANE MANAGEMENT
# ============================================================================

# # Split panes (opens in current directory)
# # Don't use this a lot so maybe just keep the defaults tmux keybinds for splitting (prefix + " or %)
# bind-key \\ split-window -h -c '#{pane_current_path}'
# bind-key - split-window -v -c '#{pane_current_path}'
# bind -n M-| split-window -h -c '#{pane_current_path}'
# bind -n M-_ split-window -v -c '#{pane_current_path}'

# Navigate panes (prefix + h/l or Cmd+[/])
bind-key -r h select-pane -t :.-
bind-key -r l select-pane -t :.+
bind -n M-[ select-pane -t :.- \; select-pane -P bg=#434C5E \; run 'sleep 0.1' \; select-pane -P bg=default
bind -n M-] select-pane -t :.+ \; select-pane -P bg=#434C5E \; run 'sleep 0.1' \; select-pane -P bg=default

# ============================================================================
# KEYBINDS - WINDOW MANAGEMENT
# ============================================================================

# Create/close windows with cmd + t/w, see ghostty config
bind -n M-t new-window -c "#{pane_current_path}"
bind -n M-w kill-pane

# Navigate windows cmd + shift + [ or ], see ghostty config
bind -n M-< previous-window
bind -n M-> next-window

# ============================================================================
# KEYBINDS - SESSION MANAGEMENT
# ============================================================================

# Session switcher with fzf + sesh + custom projects
bind -n M-J run-shell "sesh connect \"\$(
  ( 
    sesh list -t --icons;
    sesh list -c --icons;
    ls -d ~/Projects/*/ | rg -v 'packages' | rg -v 'archive' ;
    ls -d ~/Projects/packages/python/*/ ;
    ls -d ~/Projects/packages/julia/*/ ;
  ) | fzf-tmux -p 50%,30% \
    --no-sort --reverse --ansi --border-label ' sesh ' --prompt '  ' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-x:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:35%' \
    --preview ''
)\""

# same keymap for C-f
bind -n C-f run-shell "sesh connect \"$(
  ( 
    sesh list -t --icons;
    sesh list -c --icons;
    ls -d ~/Projects/*/ | rg -v 'packages' | rg -v 'archive' | xargs -n 1 basename | sed 's/^/\uF114 /';
    ls -d ~/Projects/packages/python/*/ | xargs -n 1 basename;
    ls -d ~/Projects/packages/julia/*/ | xargs -n 1 basename;
  ) | fzf-tmux -p 50%,30% \
    --no-sort --reverse --ansi --border-label ' sesh ' --prompt '  ' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-x:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:35%' \
    --preview ''
)\""

# Quickly switch to last session
bind -n M-L  run-shell "sesh last || tmux display-message -d 1000 'Only one session'"

# Automatic session restore using restore + continuum
set -g @continuum-restore 'on'

# ============================================================================
# PLUGIN MANAGER (must be at the end)
# ============================================================================

# Initialize TPM - keep this at the very bottom
run '~/.config/tmux/plugins/tpm/tpm'

# tmux 3.6a misparses tmux-dotbar's conditional current-window format and can
# render fragments like "bold]" literally. Override it with a simple format.
set -g window-status-current-format '#[bg=#2E3440,fg=#EBCB8B] #W #[fg=#39BAE6,bg=#2E3440]#{?window_zoomed_flag,󰊓,}#[default]'
